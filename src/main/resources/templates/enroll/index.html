<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang chủ của tôi</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #f5f7fb; color: #1f2937; }
        .container { max-width: 900px; margin: 24px auto; padding: 0 16px; }
        .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 18px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
        h1 { margin: 0 0 8px; color: #14348f; }
        p { color: #475569; }
        .actions { display: flex; gap: 10px; margin-top: 14px; }
        .btn { text-decoration: none; border: 1px solid #cbd5e1; border-radius: 6px; padding: 8px 12px; background: #fff; color: #1f2937; }
        .btn-primary { background: #1247c7; border-color: #1247c7; color: #fff; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>Trang chủ của tôi<i></i></h1>
        <div th:if="${successMessage}" style="margin:10px 0;padding:10px;border-radius:6px;background:#dcfce7;color:#166534;">
            <span th:text="${successMessage}">Đặt lịch thành công</span>
        </div>
        <h3>Lịch khám của tôi</h3>
        <table style="width:100%;border-collapse:collapse;background:#fff;">
            <thead>
            <tr>
                <th style="text-align:left;border-bottom:1px solid #e5e7eb;padding:8px;">Tên bác sĩ</th>
                <th style="text-align:left;border-bottom:1px solid #e5e7eb;padding:8px;">Ngày giờ khám</th>
                <th style="text-align:left;border-bottom:1px solid #e5e7eb;padding:8px;">Khoa</th>
                <th style="text-align:left;border-bottom:1px solid #e5e7eb;padding:8px;">Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${appointments.isEmpty()}">
                <td colspan="4" style="padding:8px;">Bạn chưa có lịch khám nào</td>
            </tr>
            <tr th:each="a : ${appointments}">
                <td style="padding:8px;border-bottom:1px solid #f1f5f9;" th:text="${a.doctorName}">BS A</td>
                <td style="padding:8px;border-bottom:1px solid #f1f5f9;" th:text="${#temporals.format(a.appointmentTime, 'yyyy-MM-dd HH:mm')}">2026-03-24 08:30</td>
                <td style="padding:8px;border-bottom:1px solid #f1f5f9;" th:text="${a.departmentName}">Khoa Noi</td>
                <td style="padding:8px;border-bottom:1px solid #f1f5f9;">
                    <a class="btn" style="padding:6px 10px;font-size:13px;" th:href="@{/enroll/appointments/{id}(id=${a.id})}">Chi tiết</a>
                </td>
            </tr>
            </tbody>
        </table>
        <div class="actions">
            <a class="btn btn-primary" th:href="@{/courses}">Đặt lịch tại trang chủ</a>
            <form th:action="@{/logout}" method="post">
                <button class="btn" type="submit">Đăng xuất</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
