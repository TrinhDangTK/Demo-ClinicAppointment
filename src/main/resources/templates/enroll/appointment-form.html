<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lịch khám</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #f5f7fb; color: #1f2937; }
        .container { max-width: 700px; margin: 24px auto; padding: 0 16px; }
        .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 18px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
        .row { margin-bottom: 12px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; }
        input { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; }
        .error { margin-top: 4px; color: #dc2626; font-size: 13px; }
        .actions { display: flex; gap: 10px; margin-top: 14px; }
        .btn { text-decoration: none; border: 1px solid #cbd5e1; border-radius: 6px; padding: 8px 12px; background: #fff; color: #1f2937; }
        .btn-primary { background: #1247c7; border-color: #1247c7; color: #fff; cursor: pointer; }
        .banner-error { margin-bottom: 10px; background: #fee2e2; color: #991b1b; border-radius: 6px; padding: 8px 10px; font-size: 14px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>Đặt lịch khám</h1>
        <p th:text="'Bác sĩ: ' + ${doctor.name} + ' | Khoa: ' + ${doctor.department != null ? doctor.department.name : ''}">Bác sĩ</p>

        <div class="banner-error" th:if="${bookingError}" th:text="${bookingError}"></div>

        <form th:action="@{/enroll/appointments/create/{doctorId}(doctorId=${doctorId})}" th:object="${appointmentForm}" method="post">
            <div class="row">
                <label for="appointmentTime">Chọn ngày giờ khám</label>
                <input id="appointmentTime" type="datetime-local" th:field="*{appointmentTime}">
                <div class="error" th:if="${#fields.hasErrors('appointmentTime')}" th:errors="*{appointmentTime}"></div>
            </div>
            <div class="actions">
                <button class="btn btn-primary" type="submit">Xác nhận đặt lịch</button>
                <a class="btn" th:href="@{/courses}">Quay lại trang chủ</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
