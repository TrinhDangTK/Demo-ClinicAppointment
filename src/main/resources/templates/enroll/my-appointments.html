<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch khám của tôi</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #f5f7fb; color: #1f2937; }
        .container { max-width: 900px; margin: 24px auto; padding: 0 16px; }
        .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 18px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #e5e7eb; }
        .actions { display: flex; gap: 10px; margin-top: 14px; }
        .row-actions { display: flex; gap: 8px; }
        .btn { text-decoration: none; border: 1px solid #cbd5e1; border-radius: 6px; padding: 8px 12px; background: #fff; color: #1f2937; }
        .btn-primary { background: #1247c7; border-color: #1247c7; color: #fff; }
        .btn-danger { border-color: #dc2626; color: #dc2626; background: #fff; cursor: pointer; }
        .success { margin-bottom: 10px; background: #dcfce7; color: #166534; border-radius: 6px; padding: 8px 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>Lịch khám của tôi</h1>
        <div class="success" th:if="${successMessage}" th:text="${successMessage}"></div>
        <table>
            <thead>
            <tr>
                <th>Tên bác sĩ</th>
                <th>Ngày giờ khám</th>
                <th>Khoa</th>
                <th>Hành động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${appointments.isEmpty()}">
                <td colspan="4">Bạn chưa có lịch khám nào</td>
            </tr>
            <tr th:each="a : ${appointments}">
                <td th:text="${a.doctorName}">BS A</td>
                <td th:text="${#temporals.format(a.appointmentTime, 'yyyy-MM-dd HH:mm')}">2026-03-24 08:30</td>
                <td th:text="${a.departmentName}">Khoa Noi</td>
                <td>
                    <div class="row-actions">
                        <form th:action="@{/enroll/my-appointments/{id}/cancel(id=${a.id})}" method="post">
                            <button class="btn btn-danger" type="submit" onclick="return confirm('Bạn có chắc muốn hủy lịch khám này không?')">Hủy</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
        <div class="actions">
            <a class="btn btn-primary" th:href="@{/courses}">Đặt lịch mới</a>
            <a class="btn" th:href="@{/enroll}">Về trang chủ của tôi</a>
        </div>
    </div>
</div>
</body>
</html>
