<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit} ? 'Sua lich kham' : 'Them lich kham'">Quản lý lịch khám</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; background: #f7f7f7; }
        .card { max-width: 760px; margin: 0 auto; background: #fff; border-radius: 10px; padding: 16px; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
        .row { margin-bottom: 12px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; }
        input, select, textarea { width: 100%; padding: 9px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        textarea { min-height: 80px; }
        .error { color: #dc3545; font-size: 13px; margin-top: 4px; }
        .actions { display: flex; gap: 8px; margin-top: 14px; }
        .btn { text-decoration: none; border: 1px solid #ccc; border-radius: 6px; padding: 8px 12px; background: #fff; color: #222; cursor: pointer; }
        .btn-primary { background: #0d6efd; color: #fff; border-color: #0d6efd; }
    </style>
</head>
<body>
<div class="card">
    <h1 th:text="${isEdit} ? 'Sửa lịch khám' : 'Thêm lịch khám'">Thêm lịch khám</h1>
    <form th:action="${isEdit} ? @{/admin/appointments/{id}/edit(id=${appointmentId})} : @{/admin/appointments/create}"
          th:object="${appointmentForm}" method="post">

        <div class="row">
            <label for="patientId">Bệnh nhân</label>
            <select id="patientId" th:field="*{patientId}">
                <option value="">-- Chọn bệnh nhân --</option>
                <option th:each="p : ${patients}" th:value="${p.id}" th:text="${p.username}">patient01</option>
            </select>
            <div class="error" th:if="${#fields.hasErrors('patientId')}" th:errors="*{patientId}"></div>
        </div>

        <div class="row">
            <label for="doctorId">Bác sĩ</label>
            <select id="doctorId" th:field="*{doctorId}">
                <option value="">-- Chọn bác sĩ --</option>
                <option th:each="d : ${doctors}" th:value="${d.id}" th:text="${d.name}">BS A</option>
            </select>
            <div class="error" th:if="${#fields.hasErrors('doctorId')}" th:errors="*{doctorId}"></div>
        </div>

        <div class="row">
            <label for="appointmentTime">Ngày giờ khám</label>
            <input id="appointmentTime" type="datetime-local" th:field="*{appointmentTime}">
            <div class="error" th:if="${#fields.hasErrors('appointmentTime')}" th:errors="*{appointmentTime}"></div>
        </div>

        <div class="row">
            <label for="status">Trạng thái</label>
            <select id="status" th:field="*{status}">
                <option value="">-- Chọn trạng thái --</option>
                <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}">PENDING</option>
            </select>
            <div class="error" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></div>
        </div>

        <div class="row">
            <label for="note">Ghi chú</label>
            <textarea id="note" th:field="*{note}" placeholder="Ghi chú (nếu có)"></textarea>
        </div>

        <div class="actions">
            <button class="btn btn-primary" type="submit" th:text="${isEdit} ? 'Cập nhật' : 'Tạo mới'">Tạo mới</button>
            <a class="btn" th:href="@{/admin/appointments}">Quay lại</a>
        </div>
    </form>
</div>
</body>
</html>
