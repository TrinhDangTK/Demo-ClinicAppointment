<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit} ? 'Sua bac si' : 'Them bac si'">Doctor Form</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; background: #f7f7f7; }
        .card { max-width: 680px; margin: 0 auto; background: #fff; border-radius: 10px; padding: 16px; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
        .row { margin-bottom: 12px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; }
        input, select { width: 100%; padding: 9px; border: 1px solid #ccc; border-radius: 6px; }
        .error { color: #dc3545; font-size: 13px; margin-top: 4px; }
        .actions { display: flex; gap: 8px; margin-top: 14px; }
        .btn { text-decoration: none; border: 1px solid #ccc; border-radius: 6px; padding: 8px 12px; background: #fff; color: #222; cursor: pointer; }
        .btn-primary { background: #0d6efd; color: #fff; border-color: #0d6efd; }
    </style>
</head>
<body>
<div class="card">
    <h1 th:text="${isEdit} ? 'Sửa thông tin' : 'Thêm bác sĩ'">Thêm bác sĩ</h1>

    <form th:action="${isEdit} ? @{/admin/doctors/{id}/edit(id=${doctorId})} : @{/admin/doctors/create}"
          th:object="${doctorForm}" method="post">

        <div class="row">
            <label for="name">Tên bác sĩ</label>
            <input id="name" type="text" th:field="*{name}" placeholder="Nhập tên bác sĩ">
            <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <div class="row">
            <label for="specialty">Chuyên khoa</label>
            <input id="specialty" type="text" th:field="*{specialty}" placeholder="Nhập chuyên khoa">
            <div class="error" th:if="${#fields.hasErrors('specialty')}" th:errors="*{specialty}"></div>
        </div>

        <div class="row">
            <label for="departmentId">Khoa</label>
            <select id="departmentId" th:field="*{departmentId}">
                <option value="">-- Chọn khoa --</option>
                <option th:each="dept : ${departments}" th:value="${dept.id}" th:text="${dept.name}">Khoa Noi</option>
            </select>
            <div class="error" th:if="${#fields.hasErrors('departmentId')}" th:errors="*{departmentId}"></div>
        </div>

        <div class="row">
            <label for="imageUrl">Link hình ảnh</label>
            <input id="imageUrl" type="text" th:field="*{imageUrl}" placeholder="https://...">
            <div class="error" th:if="${#fields.hasErrors('imageUrl')}" th:errors="*{imageUrl}"></div>
        </div>

        <div class="actions">
            <button class="btn btn-primary" type="submit" th:text="${isEdit} ? 'Cập nhật' : 'Tạo mới'">Tạo mới</button>
            <a class="btn" th:href="@{/admin/doctors}">Quay lại </a>
        </div>
    </form>
</div>
</body>
</html>
