spring.application.name=clinicappointment

# File tuy chon tren may ban (khong commit): chua mat khau DB / OAuth
spring.config.import=optional:classpath:application-local.properties

# Database — dùng biến môi trường hoặc application-local.properties
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/clinicappointment?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
# spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
# spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.username=root
spring.datasource.password=trinh2108

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Google OAuth2 — KHONG ghi secret that vao day khi push Git. Dat bien moi truong hoac application-local.properties
# GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET
# Redirect URI: http://localhost:8080/login/oauth2/code/google

spring.security.oauth2.client.registration.google.provider=google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:REPLACE_ME}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:REPLACE_ME}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
